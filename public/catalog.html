<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Gestión</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
        </ul>
    </nav>

    <h1>Catálogo de Items</h1>

    <div id="catalogContainer" class="catalog-grid">
        <!-- Aquí se van a renderizar las tarjetas con los items -->
        <section class="card">
            <h1 id="flor-name"></h1>
            <img id="flor-img" src="" alt="">
        </section>
    </div>

     <div id="flor-modal" class="modal hidden">
            <div class="modal-content">
                <!--<span id="close-modal">&times;</span>-->
                <h2 id="modal-name"></h2>
                <img id="modal-img" src="" alt="flor grande">
                <p id="modal-id" class="flor-id"></p>

                <div class="modal-info">
                    <p><strong>Precio: $</strong> <span id="modal-price"></span></p>
                    <p><strong>Color:</strong> <span id="modal-color"></span></p>
                    <p><strong>Tamaño:</strong> <span id="modal-size"></span></p>
                    <p><strong>Origen:</strong> <span id="modal-origen"></span></p>
                    <p><strong>Descripción:</strong> <span id="modal-description"></span></p>
                    
                
                </div>

                <div id="modal-stats" class="modal-stats"></div>

    <script type="module" src="./js/catalog.js"></script>
</body>
</html>
