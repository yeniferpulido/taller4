    <body>
    <h1>Buscar Flores</h1>

    <div class="search-container">

        <label>Categoría:</label>
        <select id="categorySelect">
            <option value="">Seleccione una categoría</option>
            <option value="color">Color</option>
            <option value="price">Precio</option>
            <option value="size">Tamaño</option>
            <option value="origin">Origen</option>
        </select>

        <label>Indique qué busca:</label>
        <select id="valueSelect" disabled>
            <option value="">Primero seleccione una categoría</option>
        </select>

    </div>

    <div id="resultsContainer" class="catalog-grid"></div>

     <div id="flor-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-modal" class="close">&times;</span>
                <h2 id="modal-name"></h2>
                <img id="modal-img" src="" alt="flor grande">
                <p id="modal-id" class="flor-id"></p>

                <div class="modal-info">
                    <p><strong>Precio: $</strong> <span id="modal-price"></span></p>
                    <p><strong>Color:</strong> <span id="modal-color"></span></p>
                    <p><strong>Tamaño:</strong> <span id="modal-size"></span></p>
                    <p><strong>Origen:</strong> <span id="modal-origin"></span></p>
                    <p><strong>Descripción:</strong> <span id="modal-description"></span></p>
                </div>
    </div>

    <script type="module" src="./js/buscar.js"></script>
</html>
